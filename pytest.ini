[pytest]
# This file prevents pytest from trying to collect tests from multiple services at once
# when running from the project root.
#
# To run tests, cd into each service directory:
#   cd customer-service && pytest -v
#   cd notification-service && pytest -v
#   cd email-sender && pytest -v
#
# Or use the convenience script:
#   ./run-tests.sh

# Don't collect tests from project root
norecursedirs = .git .venv __pycache__ htmlcov node_modules frontend wiremock .github

# Require explicit directory specification when running from root
testpaths = .
