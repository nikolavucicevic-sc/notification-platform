services:

  postgres:
    image: postgres:15
    container_name: notification-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: notification_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d notification_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - notification-network

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - notification-network

  wiremock:
    image: wiremock/wiremock:latest
    container_name: notification-wiremock
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock:/home/wiremock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - notification-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/notification_platform
      REDIS_URL: redis://redis:6379
      REDIS_EMAIL_QUEUE: email:queue
      REDIS_SMS_QUEUE: sms:queue
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - notification-network

  customer-service:
    build:
      context: ./customer-service
      dockerfile: Dockerfile
    container_name: customer-service
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/notification_platform
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - notification-network

  scheduler-service:
    build:
      context: ./scheduler-service
      dockerfile: Dockerfile
    container_name: scheduler-service
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/notification_platform
      NOTIFICATION_SERVICE_URL: http://notification-service:8002
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - notification-network

  template-service:
    build:
      context: ./template-service
      dockerfile: Dockerfile
    container_name: template-service
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/notification_platform
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - notification-network

  email-sender:
    build:
      context: ./email-sender
      dockerfile: Dockerfile
    container_name: email-sender
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_EMAIL_QUEUE: email:queue
      WIREMOCK_URL: http://wiremock:8080
    depends_on:
      redis:
        condition: service_healthy
      wiremock:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - notification-network

  sms-sender:
    build:
      context: ./sms-sender
      dockerfile: Dockerfile
    container_name: sms-sender
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_SMS_QUEUE: sms:queue
      CUSTOMER_SERVICE_URL: http://customer-service:8001
      SMS_API_URL: http://wiremock:8080/sms/send
    depends_on:
      redis:
        condition: service_healthy
      wiremock:
        condition: service_healthy
      customer-service:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - notification-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notification-frontend
    ports:
      - "3000:80"
    depends_on:
      notification-service:
        condition: service_healthy
      customer-service:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - notification-network

  # Bundle G: DevOps & Performance - Monitoring Stack

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - notification-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - notification-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "6831:6831/udp"  # Jaeger agent
      - "16686:16686"    # Jaeger UI
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    restart: unless-stopped
    networks:
      - notification-network

  locust:
    build:
      context: ./locust
      dockerfile: Dockerfile
    container_name: locust
    ports:
      - "8089:8089"
    depends_on:
      - notification-service
    restart: unless-stopped
    networks:
      - notification-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  notification-network:
    driver: bridge
