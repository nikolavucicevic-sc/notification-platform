    # Swagger UI — template-service
    location /api/templates/docs {
        proxy_pass http://template-service:8004/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/templates/openapi.json {
        proxy_pass http://template-service:8004/api/templates/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
