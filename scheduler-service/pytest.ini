[pytest]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
addopts = -v --tb=short --cov=app --cov-report=term-missing --log-cli-level=INFO -s
markers =
    unit: Unit tests for models and functions
    api: API endpoint tests
    scheduler: Scheduler service tests
log_cli = true
log_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
